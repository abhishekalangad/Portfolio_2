<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_19 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_19" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_19');
  const devicePixelRatio = window.devicePixelRatio || 1;
  (function() {
  const container = document.getElementById('threejs-container-ANIMATION_HERO');
  const width = container.clientWidth || window.innerWidth;
  const height = container.clientHeight || window.innerHeight;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  camera.position.z = 5;

  const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(width, height);
  container.appendChild(renderer.domElement);

  // Group for the entire organic system
  const group = new THREE.Group();
  scene.add(group);

  // Organic "leaf" or "seed" geometry
  const geometry = new THREE.IcosahedronGeometry(2, 3);
  const material = new THREE.MeshPhongMaterial({
    color: 0x4a7c59, // Terra primary green
    wireframe: true,
    transparent: true,
    opacity: 0.25,
  });
  const mesh = new THREE.Mesh(geometry, material);
  group.add(mesh);

  // Floating particles around the core
  const particlesCount = 150;
  const positions = new Float32Array(particlesCount * 3);
  for(let i = 0; i < particlesCount * 3; i++) {
    positions[i] = (Math.random() - 0.5) * 10;
  }
  const particlesGeometry = new THREE.BufferGeometry();
  particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particlesMaterial = new THREE.PointsMaterial({
    color: 0x4a7c59,
    size: 0.05,
    transparent: true,
    opacity: 0.4
  });
  const particles = new THREE.Points(particlesGeometry, particlesMaterial);
  group.add(particles);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambientLight);

  const pointLight = new THREE.PointLight(0x4a7c59, 2);
  pointLight.position.set(5, 5, 5);
  scene.add(pointLight);

  // Interactive mouse follow
  let mouseX = 0;
  let mouseY = 0;
  document.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth) - 0.5;
    mouseY = (e.clientY / window.innerHeight) - 0.5;
  });

  function animate() {
    requestAnimationFrame(animate);
    const time = Date.now() * 0.001;

    mesh.rotation.x += 0.001;
    mesh.rotation.y += 0.001;
    particles.rotation.y += 0.0005;

    // Breathing scale effect
    const s = 1 + Math.sin(time) * 0.05;
    mesh.scale.set(s, s, s);

    // Smooth movement
    group.position.x += (mouseX * 2 - group.position.x) * 0.03;
    group.position.y += (-mouseY * 2 - group.position.y) * 0.03;

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  animate();
})();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_19 -->
</body>
</html>
